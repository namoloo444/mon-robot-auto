name: Fire_Faucet_Permanent_24h
on:
  schedule:
    - cron: '0 */6 * * *' # Se relance toutes les 6 heures par sécurité
  workflow_dispatch:

jobs:
  non-stop:
    runs-on: ubuntu-latest
    steps:
      - name: Lancement du Moteur Permanent
        env:
          FIRE_COOKIE: ${{ secrets.FIRE_COOKIE }}
        run: |
          python3 -c "
          import requests, time, os
          headers = {
              'Cookie': os.getenv('FIRE_COOKIE'),
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
          }
          print('🚀 Robot Fire Faucet EN LIGNE 24h/24...')
          while True:
              try:
                  # On frappe à la porte toutes les 60 secondes pour gagner 1 point d'activité
                  r = requests.get('https://firefaucet.win/start', headers=headers, timeout=10)
                  print(f'✅ Point gagné ! Rang en cours de chute. Status: {r.status_code}')
              except Exception as e:
                  print(f'⚠️ Erreur: {e}. Nouvelle tentative dans 10s...')
                  time.sleep(10)
              time.sleep(60) 
          "
