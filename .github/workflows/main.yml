name: Fire_Faucet_Elite_Turbo
on:
  schedule:
    - cron: '*/5 * * * *' # S'exécute TOUTES LES 5 MINUTES
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Connexion Furtive Infinix
        run: |
          curl -s -X POST "https://firefaucet.win" \
          -H "Cookie: ${{ secrets.FIRE_COOKIE }}" \
          -H "User-Agent: Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/137.0.0.0 Mobile Safari/537.36" \
          -H "Referer: https://firefaucet.win/" \
          -H "X-Requested-With: XMLHttpRequest"
          echo "Points Fire Faucet envoyes avec succes !"
